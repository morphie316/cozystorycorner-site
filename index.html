<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Story Corner</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #fffaf4 0%, #fff3e6 100%);
      color: #2f2a26;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px;
      text-align: center;
    }

    .card {
      background: white;
      border: 2px solid #eadfce;
      border-radius: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.5;
      color: #6f665f;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    a.button {
      display: block;
      text-decoration: none;
      background: #7b5cff;
      color: white;
      font-weight: bold;
      padding: 16px;
      border-radius: 18px;
    }

    a.button.secondary {
      background: #ffb84d;
      color: #2f2a26;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>🌱 Cozy Story Corner</h1>
      <p>Gentle tools for storytelling, imagination, and kid-friendly adventures.</p>

      <div class="links">
        <a class="button" href="story-dice/">🎲 Story Dice</a>
        <a class="button secondary" href="mystery/">🕵️ Mystery Generator</a>
      </div>
    </div>
  </div>
</body>
</html>
